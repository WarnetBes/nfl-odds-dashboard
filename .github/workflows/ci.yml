name: CI — Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Запрещаем параллельные прогоны на одной ветке
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true        # падение одной версии останавливает остальные
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas requests
          # Дополнительные зависимости если есть requirements.txt
          if [ -f requirements.txt ]; then
            # Исключаем streamlit/plotly/gspread — они не нужны для unit-тестов
            grep -vE "^(streamlit|plotly|gspread|google-auth|pytz|altair|watchdog)" \
              requirements.txt | pip install -r /dev/stdin || true
          fi

      - name: Run tests
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GSHEET_URL: ${{ secrets.GSHEET_URL }}
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --no-header \
            -q

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
            *.log
          retention-days: 7
